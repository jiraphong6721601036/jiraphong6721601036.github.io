function putPixel(x,y,r,g,b,a =255)
{
    const idx = (y*canvas.width+ x)*4;
    pixels[idx]=r;
    pixels[idx+1]=g;
     pixels[idx+2]=b;
        pixels[idx+3]=a;
}

function drawLine(x1, y1, x2, y2, r, g, b, a = 255) {
  const dx = Math.abs(x2 - x1);
  const dy = Math.abs(y2 - y1);

  if(dx > dy) {
    const m = (y2 - y1) / (x2 - x1);
    const c = y1 - m * x1;
    for (let x = Math.min(x1, x2); x <= Math.max(x1, x2); x++) {
      const y = Math.round(m * x + c);
      putPixel(x, y, r, g, b, a);
    }
  } else {
    const m = (x2 - x1) / (y2 - y1);
    const c = x1 - m * y1;
    for (let y = Math.min(y1, y2); y <= Math.max(y1, y2); y++) {
      const x = Math.round(m * y + c);
      putPixel(x, y, r, g, b, a);
    }
  }
}

function drawrec(x1,y1,x2,y2,r,g,b,a=255){
        drawLine (x1,y1,x2,y1,r,g,b,a);
        drawLine (x2,y1,x2,y2,r,g,b,a);
        drawLine (x2,y2,x1,y2,r,g,b,a);
        drawLine (x1,y2,x1,y1,r,g,b,a);
}

function drawfill(x1,y1,x2,y2,r,g,b,a=255){
        for(let y =y1; y<= y2; y++){
                for(let x= x1; x<= x2;x++){

}
function drawgradient(x1,y1,x2,y2,r1,g1,b1,r2,g2,b2,a=255){
        for(let y= y1;y<=y2;y++){
                let t = (y-y1) / (y2-y1);
                let r = Math.round(r1*(1-t)+r2*t)
                let g = Math.round(g1*(1-t)+g2*t)
                let b = Math.round(b1*(1-t)+b2*t)
                for(let x=x1;x<=x2;x++){
                putPixel(x,y,r,g,b,a);
        }
        }

}

    for (let y = -ry; y <= ry; y++) {
        for (let x = -rx; x <= rx; x++) {
            if ((x * x) / (rx * rx) + (y * y) / (ry * ry) < 1) {
                putPixel(cx + x, cy + y, r, g, b, a);
            }
        }
    }
}

                                const y_rotated = Math.round(cX * Math.sin(rad) + cY* Math.cos(rad));
                                
                                //Scale
                                const x_scale=Math.round(x_rotated*scaleX);
                                const y_scale=Math.round(y_rotated*scaleY);
                                const x_tran= x_scale+x;
                                const y_tran= y_scale+y;

                                //putPixel(x_scale+x,y_scale+y,r,g,b,a);
                                drawcircle(x_tran,y_tran,Math.round(scaleX),Math.round(scaleY),r,g,b);
                        }
                }
        }
}             
function toScaledMouseCoords(clientX, clientY) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    return {
        x: Math.floor((clientX - rect.left) * scaleX),
        y: Math.floor((clientY - rect.top) * scaleY)
    };
}
canvas.addEventListener('click', function(event) {
    const { x, y } = toScaledMouseCoords(event.clientX, event.clientY);

    console.log('clicked', x, y);
    putPixel(x, y, 255, 0, 0); // Draw a red pixel on click
    ctx.putImageData(imageData, 0, 0);
});
canvas.addEventListener('mousedown', function(event) {
        isDraging = true;
        const { x, y } = toScaledMouseCoords(event.clientX, event.clientY);
    console.log('mousedown', x, y);
    putPixel(x, y, 0, 0, 255); // Draw a red pixel on click
    ctx.putImageData(imageData, 0, 0);
});
canvas.addEventListener('mouseup', function(event) {
     isDraging = false;  
    const { x, y } = toScaledMouseCoords(event.clientX, event.clientY); 
    console.log('mouseup', x, y);
    putPixel(x, y, 0, 255, 0); // Draw a red pixel on click
    ctx.putImageData(imageData, 0, 0);
});
canvas.addEventListener('mousemove', function(event) {  
const { x, y } = toScaledMouseCoords(event.clientX, event.clientY);
    mouseX= x;
    mouseY =y;
    if(isDraging){
    drawLine(previousMouseX,previousMouseY,x, y, r, g, b);
    ctx.putImageData(imageData, 0, 0);}
         previousMouseX = x;
         previousMouseY = y;
});
window.addEventListener('keydown',function(event){
        console.log('keydown',event.key);
      if(event.key =='1'){
        r=255; g=0; b=0;
      }else if(event.key=='2'){
        r=0; g=255; b=0;
      }else if(event.key=='3'){
        r=0; g=0; b=255;
      }else if(event.key=='e'){
        r=255; g=255; b=255;
      }
      
     if(event.key=='ArrowUp'){
                scale +=0.5;
            
            }else if(event.key=='ArrowDown'){
                scale -=0.5;
            
            }
            
            if(event.key=='ArrowLeft'){
                degree -=3;
            
            }else if(event.key=='ArrowRight'){
                degree +=3;
            
            }
}); 

window.addEventListener('keyup',function(event){
        console.log('keyup',event.key);
});   
function animate (){
        drawfill (0,0,canvas.width,canvas.height,255,255,255);
        drawLine(100,100,canvas.width-1,100,0,0,0);
        drawLine(100,100,100,0,0,0,0);
        drawSprite24Bit(smileSprite24Bit,50,50);
        drawsprite24bitRotateScale(smileSprite24Bit32x32,mouseX,mouseY,degree,scale,scale);
        ctx.putImageData(imageData, 0, 0);
        requestAnimationFrame(animate);
}
animate();
</script>
