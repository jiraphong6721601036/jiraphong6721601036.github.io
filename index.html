<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive Computer Graphics</title>
<style>
  :root{
    --bg: #1a1812;
    --panel: #171b22;
    --ink: #e9e7de;
    --ink-dim: #9aa0ab;
    --rule: #2a2f38;
    --cyan: #4fd1c5;
    --magenta: #ff5c8a;
    --grid-px: 6px;
  }

  *{box-sizing:border-box; margin:0; padding:0;}

  body{
    background: var(--bg);
    color: var(--ink);
    font-family: 'IBM Plex Sans', 'Noto Sans Thai', -apple-system, sans-serif;
    line-height: 1.6;
    padding: 0;
  }

  .page{
    max-width: 780px;
    margin: 0 auto;
    padding: 64px 32px 96px;
  }

  header{
    margin-bottom: 56px;
    border-bottom: 1px solid var(--rule);
    padding-bottom: 32px;
  }

  .eyebrow{
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--cyan);
    margin-bottom: 14px;
  }

  h1{
    position: relative;
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 700;
    font-size: 46px;
    letter-spacing: -0.01em;
    color: var(--ink);
    display: inline-block;
  }
  h1::before, h1::after{
    content: attr(data-text);
    position: absolute;
    left: 0; top: 0;
    width: 100%; height: 100%;
    background: var(--bg);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  h1::before{
    color: var(--cyan);
    opacity: 0.55;
    transform: translate(2px, -1px);
    z-index: -1;
  }
  h1::after{
    color: var(--magenta);
    opacity: 0.5;
    transform: translate(-2px, 1px);
    z-index: -1;
  }

  .role{
    margin-top: 10px;
    font-size: 17px;
    color: var(--ink-dim);
  }

  .contact-row{
    margin-top: 20px;
    display: flex;
    flex-wrap: wrap;
    gap: 18px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    color: var(--ink-dim);
  }
  .contact-row span::before{
    content: "▸ ";
    color: var(--cyan);
  }

  section{ margin-bottom: 48px; }

  .sec-label{
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--cyan);
    margin-bottom: 20px;
  }
  .sec-label .px-rule{
    flex: 1;
    height: 6px;
    background-image: linear-gradient(90deg, var(--rule) 0 2px, transparent 2px 6px);
    background-size: var(--grid-px) 1px;
  }

  p.lead{ color: var(--ink-dim); font-size: 15px; max-width: 62ch; line-height: 2; }
  p.lead strong{ color: var(--ink); font-weight: 700; }

  .item{
    display: grid;
    grid-template-columns: 150px 1fr;
    gap: 18px;
    padding: 18px 0;
    border-bottom: 1px solid var(--rule);
  }
  .item:last-child{ border-bottom: none; }

  .item .when{
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--ink-dim);
    padding-top: 3px;
  }

  .item .what h3{
    font-size: 16px;
    font-weight: 600;
    color: var(--ink);
  }
  .item .what .org{
    font-size: 13px;
    color: var(--magenta);
    margin-top: 2px;
    font-family: 'IBM Plex Mono', monospace;
  }
  .item .what ul{
    margin-top: 10px;
    padding-left: 18px;
    color: var(--ink-dim);
    font-size: 14px;
  }
  .item .what li{ margin-bottom: 4px; }

  .skills-grid{
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }
  .skill-chip{
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12.5px;
    padding: 7px 12px;
    border: 1px solid var(--rule);
    border-radius: 3px;
    color: var(--ink-dim);
  }
  .skill-chip::before{ content:"■ "; color: var(--cyan); font-size: 8px; }

  /* ---- ชื่อผลงาน (project title) ---- */
  .work-title{
    font-size: 17px;
    font-weight: 700;
    color: var(--ink);
    margin-bottom: 6px;
  }
  .work-sub{
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--ink-dim);
    margin-bottom: 16px;
  }

  .portfolio-frame{
    border: 1px solid var(--rule);
    border-radius: 4px;
    overflow: hidden;
    background: var(--panel);
  }
  .portfolio-frame .bar{
    display:flex; align-items:center; gap:8px;
    padding: 10px 14px;
    border-bottom: 1px solid var(--rule);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--ink-dim);
  }
  .portfolio-frame .bar .dot{ width:8px; height:8px; border-radius:50%; background: var(--rule); }
  iframe.portfolio{
    width: 100%;
    height: 520px;
    border: none;
    background: #fff;
    display: block;
  }
  .portfolio-fallback{
    padding: 40px 20px;
    text-align: center;
    color: var(--ink-dim);
    font-size: 13.5px;
  }

  /* ---- ปุ่มลูกศรกดเปิด/ปิด ---- */
  .portfolio-toggle{
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    background: var(--panel);
    border: 1px solid var(--rule);
    border-radius: 4px;
    padding: 16px 18px;
    cursor: pointer;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    color: var(--ink);
    text-align: left;
  }
  .portfolio-toggle:hover{ border-color: var(--cyan); }
  .portfolio-toggle .label{
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .portfolio-toggle .label::before{
    content: "■";
    color: var(--cyan);
    font-size: 8px;
  }
  .portfolio-toggle .hint{
    color: var(--ink-dim);
    font-size: 11px;
  }
  .chevron{
    width: 18px;
    height: 18px;
    flex-shrink: 0;
    transition: transform 0.25s ease;
    color: var(--cyan);
  }
  .portfolio-toggle[aria-expanded="true"] .chevron{
    transform: rotate(180deg);
  }

  .portfolio-collapse{
    display: grid;
    grid-template-rows: 0fr;
    transition: grid-template-rows 0.3s ease;
    margin-top: 10px;
  }
  .portfolio-collapse.open{
    grid-template-rows: 1fr;
  }
  .portfolio-collapse-inner{
    overflow: hidden;
  }

  footer{
    margin-top: 40px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--ink-dim);
    text-align: center;
  }

  @media (max-width: 600px){
    .page{ padding: 40px 20px 64px; }
    h1{ font-size: 32px; }
    .item{ grid-template-columns: 1fr; gap: 6px; }
  }
</style>
</head>
<body>
<div class="page">

  <header>
    <h1 data-text="Personal Information">Personal Information</h1>
    <div class="role">Kasetsart University, Kamphaeng Saen Campus</div>
  </header>

  <section>
    <div class="sec-label">เกี่ยวกับ<span class="px-rule"></span></div>
    <p class="lead">
      <strong>ชื่อ-นามสกุล:</strong> นายจิรพงศ์ วัดเอกดีรื่น<br>
      <strong>รหัสนิสิต:</strong> 6721601036<br>
      <strong>หมู่เรียน:</strong> 700
    </p>
  </section>

  <section>
    <div class="sec-label">ทักษะ<span class="px-rule"></span></div>
    <div class="skills-grid">
      <span class="skill-chip">Figma</span>
      <span class="skill-chip">HTML / CSS</span>
      <span class="skill-chip">JavaScript</span>
      <span class="skill-chip">Design Systems</span>
    </div>
  </section>

  <!-- ===== ส่วนแสดงผลงาน (แบบกดเปิด/ปิด) ===== -->
  <section>
    <div class="sec-label">ผลงาน<span class="px-rule"></span></div>

    <div class="work-title">Interactive Computer Graphics</div>

    <button class="portfolio-toggle" id="portfolioToggle" aria-expanded="false" aria-controls="portfolioPanel">
      <span class="label">
        700_raster.html
        <span class="hint">— กดเพื่อดูตัวอย่างผลงาน</span>
      </span>
      <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="6 9 12 15 18 9"></polyline>
      </svg>
    </button>

    <div class="portfolio-collapse" id="portfolioCollapse">
      <div class="portfolio-collapse-inner">
        <div class="portfolio-frame" id="portfolioPanel">
          <div class="bar"><span class="dot"></span> 700_raster.html</div>
          <iframe class="portfolio" src="700_raster.html" title="ผลงาน 700_raster.html">
            <div class="portfolio-fallback">เบราว์เซอร์ไม่รองรับการแสดงผลไฟล์นี้แบบฝัง</div>
          </iframe>
        </div>
      </div>
    </div>
  </section>

  <script>
    const toggleBtn = document.getElementById('portfolioToggle');
    const collapse = document.getElementById('portfolioCollapse');
    toggleBtn.addEventListener('click', () => {
      const isOpen = collapse.classList.toggle('open');
      toggleBtn.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
    });
  </script>

</div>
</body>
</html>
